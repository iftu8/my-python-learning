<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate DSA Visualizer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        panelBg: '#1e293b',
                        accent: '#0ea5e9'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-slate-200 font-sans h-screen flex flex-col overflow-hidden">
    
    <header class="bg-panelBg shadow-lg border-b border-slate-700 p-4 flex justify-between items-center z-10">
        <div>
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 tracking-wider">
                Mega DSA Visualizer Pro
            </h1>
            <p class="text-xs text-slate-400 mt-1">Advanced Pathfinding & Sorting Simulator</p>
        </div>
        
        <div class="flex gap-4">
            <div class="flex flex-col items-center">
                <label class="text-xs text-slate-400 font-bold mb-1">Mode Selection</label>
                <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-600">
                    <button id="mode-sorting" class="px-4 py-1 rounded bg-accent text-white font-bold text-sm transition">Sorting</button>
                    <button id="mode-path" class="px-4 py-1 rounded text-slate-400 hover:text-white font-bold text-sm transition">Pathfinding</button>
                </div>
            </div>
            
            <div class="flex flex-col items-center">
                <label class="text-xs text-slate-400 font-bold mb-1">Animation Speed</label>
                <input type="range" id="global-speed" min="1" max="100" value="70" class="w-32 accent-cyan-500 mt-2">
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col relative w-full h-full p-4 gap-4">
        
        <div class="bg-panelBg rounded-xl border border-slate-700 p-4 shadow-2xl flex flex-wrap justify-center gap-3 items-center w-full z-10" id="controls-panel">
            </div>

        <div class="flex-1 bg-slate-900 rounded-xl border border-slate-700 shadow-inner flex justify-center items-center overflow-hidden p-4 relative" id="visualizer-container">
            </div>
        
    </main>

    <script src="script.js"></script>
</body>
</html>
